name: bq-viewer

# =============================================================================
# BQ Viewer — Docker Compose (pre-built images dari Docker Hub)
# =============================================================================
# File ini menjalankan backend + frontend menggunakan image yang sudah
# di-push ke Docker Hub via GitHub Actions (lihat .github/workflows/docker-publish.yml
# di masing-masing repo). MongoDB TIDAK disertakan — gunakan MongoDB server
# yang sudah ada (Atlas / self-hosted / dsb).
#
# Cara pakai:
#   1. cp .env.example .env
#   2. Isi DOCKER_USERNAME, MONGODB_URI, ENCRYPTION_KEY, AUTH_PASSWORD
#   3. docker compose up -d
# =============================================================================

services:
  backend:
    image: ${DOCKER_USERNAME}/be-bq-viewer:latest
    container_name: be-bq-viewer
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    restart: unless-stopped
    networks:
      - bq-viewer-network

  frontend:
    image: ${DOCKER_USERNAME}/fe-bq-viewer:latest
    container_name: fe-bq-viewer
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - PORT=80
      - BACKEND_HOST=backend
      - BACKEND_PORT=5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bq-viewer-network

networks:
  bq-viewer-network:
    driver: bridge
